<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Key • Reseller</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-body: #f1f5f9;
            --surface: #ffffff;
            --surface-hover: #f8fafc;
            --sidebar-bg: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            --sidebar-text: #e2e8f0;
            --sidebar-icon-bg: rgba(255,255,255,0.1);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border-color: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --green: #10b981;
            --green-dark: #059669;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.04);
            --radius-md: 18px;
            --radius-sm: 12px;
            --transition: 0.25s cubic-bezier(0.2, 0, 0, 1);
        }

        .dark {
            --bg-body: #0f172a;
            --surface: #1e293b;
            --surface-hover: #273548;
            --sidebar-bg: linear-gradient(180deg, #020617 0%, #0f172a 100%);
            --sidebar-text: #cbd5e1;
            --sidebar-icon-bg: rgba(255,255,255,0.08);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --primary: #60a5fa;
            --primary-hover: #3b82f6;
            --green: #34d399;
            --green-dark: #10b981;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.4);
        }

        body {
            background: var(--bg-body);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            margin: 0;
            overflow-x: hidden;
        }

        /* Sidebar (same as reseller dashboard) */
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 260px;
            height: 100vh;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
            z-index: 1040;
            transition: transform 0.3s ease;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 24px 16px;
        }
        .sidebar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            margin-bottom: 32px;
            padding: 0 8px;
        }
        .sidebar-brand i {
            background: var(--sidebar-icon-bg);
            padding: 10px;
            border-radius: 14px;
            font-size: 1.8rem;
            color: var(--green);
        }
        .sidebar-nav {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            color: var(--sidebar-text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }
        .sidebar-nav a i {
            font-size: 1.25rem;
            width: 24px;
            text-align: center;
        }
        .sidebar-nav a:hover,
        .sidebar-nav a.active {
            background: rgba(255,255,255,0.12);
            color: white;
            transform: translateX(4px);
        }
        .sidebar-footer {
            margin-top: auto;
            padding-top: 20px;
        }
        .theme-toggle-btn {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--sidebar-text);
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 500;
            transition: 0.2s;
            cursor: pointer;
        }
        .theme-toggle-btn:hover {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        /* Main content */
        .main-content {
            margin-left: 260px;
            padding: 28px 32px;
            transition: margin-left 0.3s;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile sidebar */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1035;
        }
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 1.8rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: 0.2s;
        }
        .mobile-menu-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        .dark .mobile-menu-btn:hover {
            background: rgba(255,255,255,0.05);
        }

        @media (max-width: 992px) {
            .sidebar {
                transform: translateX(-100%);
                box-shadow: none;
            }
            .sidebar.open {
                transform: translateX(0);
                box-shadow: var(--shadow-lg);
            }
            .sidebar-overlay.active {
                display: block;
            }
            .main-content {
                margin-left: 0;
                padding: 20px 16px;
                align-items: flex-start;
                padding-top: 80px;
            }
            .mobile-menu-btn {
                display: block;
            }
        }

        /* Form Card */
        .form-card {
            background: var(--surface);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 560px;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out;
            transition: var(--transition);
        }
        .form-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 25px 35px -10px rgba(0,0,0,0.15);
        }
        .form-header {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-dark) 100%);
            color: white;
            padding: 24px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
        }
        .form-header i {
            font-size: 1.8rem;
            background: rgba(255,255,255,0.2);
            padding: 8px;
            border-radius: 10px;
        }
        .form-body {
            padding: 28px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-control {
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            padding: 10px 16px;
            background: var(--surface);
            color: var(--text-primary);
            transition: 0.2s;
        }
        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .btn {
            border-radius: var(--radius-sm);
            padding: 10px 20px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
            border: none;
        }
        .btn-success {
            background: var(--green);
            color: white;
            box-shadow: 0 4px 12px rgba(16,185,129,0.3);
        }
        .btn-success:hover {
            background: var(--green-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(5,150,105,0.4);
        }
        .btn-outline-secondary {
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            background: transparent;
        }
        .btn-outline-secondary:hover {
            background: var(--surface-hover);
            border-color: #94a3b8;
        }
        .alert-info {
            background: rgba(59,130,246,0.08);
            border: 1px solid rgba(59,130,246,0.2);
            color: var(--primary);
            border-radius: var(--radius-sm);
        }
        .mobile-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border-color);
            padding: 14px 20px;
            z-index: 1030;
            display: none;
        }
        @media (max-width: 992px) {
            .mobile-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body class="light">
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <i class="bi bi-shop"></i> Reseller Panel
        </div>
        <nav class="sidebar-nav">
            <a href="{{ url_for('reseller_dashboard') }}"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="#" class="active"><i class="bi bi-plus-circle"></i> Create Key</a>
        </nav>
        <div class="sidebar-footer">
            <button class="theme-toggle-btn" id="themeToggle">
                <i class="bi bi-moon-stars" id="themeIcon"></i> <span id="themeText">Dark Mode</span>
            </button>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light w-100 mt-3 d-flex align-items-center gap-2 justify-content-center" style="border-radius:12px;">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Mobile Header -->
    <div class="mobile-header d-lg-none">
        <button class="mobile-menu-btn" id="mobileMenuBtn">
            <i class="bi bi-list"></i>
        </button>
        <span class="fw-bold fs-5">Create Key</span>
        <div></div> <!-- spacer -->
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="form-card">
            <div class="form-header">
                <i class="bi bi-plus-circle-dotted"></i> Generate License Key
            </div>
            <div class="form-body">
                <div class="alert alert-info d-flex align-items-center gap-3 mb-4">
                    <i class="bi bi-wallet2 fs-4"></i>
                    <div>
                        <strong>Your balance:</strong> {{ current_user.balance_days }} days
                    </div>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Expiration (days)</label>
                        <input type="number" class="form-control" name="expires_days" min="1" max="{{ current_user.balance_days }}" placeholder="e.g., 7" required>
                        <small class="text-muted">Each day costs 1 day from your balance.</small>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Notes (optional)</label>
                        <input type="text" class="form-control" name="notes" placeholder="Any additional info...">
                    </div>
                    <div class="d-flex gap-3 flex-wrap">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-key"></i> Generate Key
                        </button>
                        <a href="{{ url_for('reseller_dashboard') }}" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i> Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const body = document.body;
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const themeText = document.getElementById('themeText');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const mobileBtn = document.getElementById('mobileMenuBtn');

            function setTheme(theme) {
                if (theme === 'dark') {
                    body.classList.add('dark');
                    themeIcon.className = 'bi bi-sun-fill';
                    themeText.textContent = 'Light Mode';
                    localStorage.setItem('theme', 'dark');
                } else {
                    body.classList.remove('dark');
                    themeIcon.className = 'bi bi-moon-stars';
                    themeText.textContent = 'Dark Mode';
                    localStorage.setItem('theme', 'light');
                }
            }

            const storedTheme = localStorage.getItem('theme');
            if (storedTheme) {
                setTheme(storedTheme);
            } else {
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                setTheme(prefersDark ? 'dark' : 'light');
            }

            themeToggle.addEventListener('click', () => {
                const isDark = body.classList.contains('dark');
                setTheme(isDark ? 'light' : 'dark');
            });

            function openSidebar() {
                sidebar.classList.add('open');
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
            function closeSidebar() {
                sidebar.classList.remove('open');
                overlay.classList.remove('active');
                document.body.style.overflow = '';
            }

            mobileBtn.addEventListener('click', openSidebar);
            overlay.addEventListener('click', closeSidebar);

            document.querySelectorAll('.sidebar-nav a').forEach(link => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 992) closeSidebar();
                });
            });
        })();
    </script>
</body>
</html>
