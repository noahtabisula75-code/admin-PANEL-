<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Key • Reseller</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h5><i class="bi bi-plus-circle"></i> Generate License Key</h5>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <strong>Your balance:</strong> {{ current_user.balance_days }} days
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label>Expiration (days)</label>
                        <input type="number" class="form-control" name="expires_days" min="1" max="{{ current_user.balance_days }}" required>
                        <small>Each day costs 1 day from your balance.</small>
                    </div>
                    <div class="mb-3">
                        <label>Notes (optional)</label>
                        <input type="text" class="form-control" name="notes">
                    </div>
                    <button type="submit" class="btn btn-success">Generate Key</button>
                    <a href="{{ url_for('reseller_dashboard') }}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
